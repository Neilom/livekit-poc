<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Bridge – Test Page</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card h2 {
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.green { background: var(--green); }
    .dot.yellow { background: var(--yellow); }
    .dot.red { background: var(--red); }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover:not(:disabled) {
      background: #353849;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.375rem;
    }

    .field + .field { margin-top: 0.75rem; }

    #log {
      min-height: 160px;
      font-size: 0.75rem;
      line-height: 1.5;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      overflow-y: auto;
      max-height: 300px;
      font-family: ui-monospace, monospace;
    }

    .log-line { margin-bottom: 2px; }
    .log-line .ts { color: var(--muted); }
  </style>
</head>
<body>
  <h1>Voice Bridge Test</h1>
  <p class="subtitle">Manual SDP exchange for LiveKit ↔ Meta WebRTC bridge</p>

  <div class="container">
    <!-- Status -->
    <div class="card">
      <h2>Status</h2>
      <div class="status-grid">
        <div class="status-item">
          <span class="dot" id="dotLivekit"></span>
          <span>LiveKit: <strong id="statusLivekit">disconnected</strong></span>
        </div>
        <div class="status-item">
          <span class="dot" id="dotMeta"></span>
          <span>Meta/SDP: <strong id="statusMeta">idle</strong></span>
        </div>
        <div class="status-item">
          <span class="dot" id="dotCall"></span>
          <span>Call: <strong id="statusCall">none</strong></span>
        </div>
        <div class="status-item">
          <span class="dot" id="dotMic"></span>
          <span>Mic: <strong id="statusMic">off</strong></span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="card">
      <h2>Controls</h2>
      <div class="field">
        <label for="inputTo">WhatsApp number (with country code, e.g. 5511999999999)</label>
        <input type="text" id="inputTo" placeholder="5511999999999" style="
          width: 100%;
          padding: 0.6rem 0.75rem;
          background: var(--bg);
          color: var(--text);
          border: 1px solid var(--border);
          border-radius: 8px;
          font-size: 0.875rem;
          outline: none;
        " />
      </div>
      <div class="btn-row" style="margin-top:0.75rem;">
        <button class="btn-primary" id="btnStart">Start Call</button>
        <button class="btn-secondary" id="btnMute" disabled>Mute</button>
        <button class="btn-danger" id="btnTerminate" disabled>Terminate</button>
      </div>
    </div>

    <!-- SDP Exchange -->
    <div class="card">
      <h2>SDP Exchange</h2>
      <div class="field">
        <label for="sdpOffer">SDP Offer (generated — send this to Meta)</label>
        <textarea id="sdpOffer" readonly placeholder="Click 'Start Call' to generate..."></textarea>
      </div>
      <div class="field">
        <label for="sdpAnswer">SDP Answer (paste Meta's response here)</label>
        <textarea id="sdpAnswer" placeholder="Paste the SDP answer from Meta here..."></textarea>
      </div>
      <div class="btn-row" style="margin-top:0.75rem;">
        <button class="btn-primary" id="btnAnswer" disabled>Apply SDP Answer</button>
      </div>
    </div>

    <!-- Log -->
    <div class="card">
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
